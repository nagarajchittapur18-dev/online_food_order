<!DOCTYPE html>
<html>
<head>
    <title>Online Food Ordering</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>

<div class="container">
    <h2>Online Food Ordering</h2>

    <form action="order.php" method="post" onsubmit="return calculateTotal();">

        <div class="item">
            <span>Pizza (150)</span>
            <input type="number" name="pizza" id="pizza" min="0" value="0">
        </div>

        <div class="item">
            <span>Burger (100)</span>
            <input type="number" name="burger" id="burger" min="0" value="0">
        </div>

        <div class="item">
            <span>Sandwich (80)</span>
            <input type="number" name="sandwich" id="sandwich" min="0" value="0">
        </div>

        <input type="hidden" name="total" id="total">

        <button type="submit">Place Order</button>
    </form>
</div>

</body>
</html>
